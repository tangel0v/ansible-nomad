---
platforms:
  - name: ubuntu-24.04
    groups:
      - nomad_instances
    image: dokken/ubuntu-24.04
    dockerfile: ../_shared/Dockerfile.j2
    capabilities:
      - SYS_ADMIN
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    command: /bin/systemd
