---
scenario:
  name: ubuntu-20.04
  test_sequence:
    - dependency
    - syntax
    - create
    - prepare
    - converge
    - verify
    - destroy

dependency:
  name: galaxy

driver:
  name: podman

provisioner:
  name: ansible
  config_options:
    defaults:
      deprecation_warnings: false
      callback_whitelist: timer,profile_tasks
      fact_caching: jsonfile
      fact_caching_connection: ./cache
      forks: 100
    connection:
      pipelining: true
  playbooks:
    prepare: ../_shared/prepare.yml
    converge: ../_shared/converge.yml
  inventory:
    group_vars:
      nomad_instances:
        nomad_node_role: both
    host_vars:
      ubuntu-20.04:
        nomad_node_role: both

verifier:
  name: ansible

platforms:
  - name: ubuntu-20.04
    groups:
      - nomad_instances
    image: dokken/ubuntu-20.04
    dockerfile: ../_shared/Dockerfile.j2
    capabilities:
      - SYS_ADMIN
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    command: /bin/systemd

