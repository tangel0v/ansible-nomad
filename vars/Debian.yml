---
# File: vars/Debian.yml - Debian OS variables for Nomad

nomad_os_packages:
  - curl
  - git
  - "{% if (ansible_facts.distribution == 'Ubuntu' and ansible_facts.distribution_version is version('22.10', '<')) or (ansible_facts.distribution == 'Debian' and ansible_facts.distribution_version
    is version('12', '<')) %}libcgroup1{% else %}libcgroup2{% endif %}"
  - unzip
  - "{% if (ansible_facts.distribution == 'Ubuntu' and ansible_facts.distribution_version is version('19', '<')) or (ansible_facts.distribution == 'Debian' and ansible_facts.distribution_version
    is version('11', '<')) %}cgroup-bin{% else %}cgroup-tools{% endif %}"
